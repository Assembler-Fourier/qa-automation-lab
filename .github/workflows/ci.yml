name: QA Automation Lab

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  api-tests:
    name: Local target API and dashboard tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install QA dependencies
        run: npm ci

      - name: Checkout SecureTaskOps target app
        uses: actions/checkout@v4
        with:
          repository: Assembler-Fourier/securetaskops-workflow-platform
          path: target-app

      - name: Install target app dependencies
        working-directory: target-app
        run: npm install

      - name: Start target app
        working-directory: target-app
        timeout-minutes: 1
        run: |
          npm start > ../target-app.log 2>&1 &
          echo $! > ../target-app.pid

      - name: Wait for target app
        timeout-minutes: 1
        run: npx wait-on --timeout 30000 http-get://127.0.0.1:3000/health

      - name: Show target app logs on failure
        if: failure()
        run: cat target-app.log || true

      - name: Run Playwright API tests
        env:
          QA_BASE_URL: http://127.0.0.1:3000
        run: npm run test:securetaskops

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-local-target
          path: playwright-report/

  live-api-smoke:
    name: Live SecureTaskOps smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install QA dependencies
        run: npm ci

      - name: Run tests against live SecureTaskOps
        env:
          QA_BASE_URL: https://securetaskops-workflow-platform.vercel.app
        run: npm run test:securetaskops

      - name: Upload live Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-live-target
          path: playwright-report/

  portfolio-product-contracts:
    name: Portfolio and live-product contracts
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout QA repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install QA dependencies
        run: npm ci

      - name: Verify portfolio, SEO, CV, case studies, and product boundaries
        run: npm run test:portfolio

      - name: Upload contract-test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-product-contracts
          path: playwright-report/
